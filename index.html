<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="风の魔法禁书录 - 极简赛博朋克数字时钟与秘密入口">
    <meta name="author" content="Feng-180">
    <meta property="og:title" content="风の魔法禁书录">
    <meta property="og:description" content="赛博朋克风格的数字时钟与秘密入口">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    <link rel="canonical" href="https://feng-180.github.io/">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>风の魔法禁书録</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Particle canvas */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Clock */
        #clock {
            font-size: clamp(3rem, 15vw, 12rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, var(--cyan), #ffffff, var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: clockGlow 4s ease-in-out infinite;
        }

        @keyframes clockGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 25px rgba(0, 242, 255, 0.6)) drop-shadow(0 0 50px rgba(0, 242, 255, 0.2));
            }
        }

        .meta {
            text-align: center;
            color: #888;
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        .motto {
            font-size: 0.85rem;
            margin-top: 6px;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        /* Hidden trigger */
        .trigger {
            position: fixed;
            bottom: 20px;
            width: 40px;
            height: 2px;
            background: #222;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        .trigger:hover {
            background: #444;
        }

        .trigger:focus-visible {
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }

        .trigger.active {
            background: var(--cyan);
            width: 60px;
            box-shadow: 0 0 15px var(--cyan);
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loading.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 242, 255, 0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* CRT scanline overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px;
            opacity: 0.3;
        }
    </style>
    <noscript>
        <style>
            #loading {
                display: none !important;
            }
        </style>
    </noscript>
</head>

<body>
    <div id="loading">
        <div class="loader"></div>
    </div>
    <div class="scanlines"></div>
    <canvas id="particles"></canvas>

    <div id="clock">00:00:00</div>
    <div class="meta">
        <div id="date">2026年3月7日</div>
        <div class="motto">我曾经来过这个世界</div>
        <div class="motto">I was here.</div>
    </div>
    <div class="trigger" id="trigger" role="button" tabindex="0" aria-label="秘密入口"></div>

    <noscript>
        <p>本站需要 JavaScript 支持才能正常运行。</p>
    </noscript>

    <script>
        // Loading
        window.addEventListener('load', function () {
            setTimeout(function () {
                document.getElementById('loading').classList.add('hidden');
            }, 800);
        });

        // Clock
        var clockEl = document.getElementById('clock');
        var dateEl = document.getElementById('date');
        var dayNames = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        function updateClock() {
            var now = new Date();
            clockEl.textContent = now.toTimeString().split(' ')[0];
            dateEl.textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 ' + dayNames[now.getDay()];
            requestAnimationFrame(updateClock);
        }
        updateClock();

        // Secret trigger
        var count = 0;
        var timer = null;
        var triggerEl = document.getElementById('trigger');

        function handleTrigger() {
            count++;
            clearTimeout(timer);
            triggerEl.classList.add('active');
            timer = setTimeout(function () {
                count = 0;
                triggerEl.classList.remove('active');
            }, 1000);

            if (count >= 5) {
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '0';
                setTimeout(function () {
                    window.location.href = 'portal.html';
                }, 500);
            }
        }

        triggerEl.addEventListener('click', handleTrigger);
        triggerEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                handleTrigger();
            }
        });

        // Particles
        var cvs = document.getElementById('particles');
        var ctx = cvs.getContext('2d');
        var w, h, pts = [];

        function initParticles() {
            w = cvs.width = window.innerWidth;
            h = cvs.height = window.innerHeight;
            pts = [];
            var count = w < 600 ? 25 : 50;
            for (var i = 0; i < count; i++) {
                pts.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    size: Math.random() * 1.5 + 0.5,
                    pulse: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.015 + 0.005
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, w, h);

            for (var i = 0; i < pts.length; i++) {
                var p = pts[i];
                p.pulse += p.speed;
                var alpha = 0.3 + Math.sin(p.pulse) * 0.2;

                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 242, 255, ' + alpha + ')';
                ctx.fill();

                // Connections
                for (var j = i + 1; j < pts.length; j++) {
                    var p2 = pts[j];
                    var dx = p.x - p2.x, dy = p.y - p2.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(0, 242, 255, ' + (0.08 * (1 - dist / 120)) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
    </script>
</body>

</html>
